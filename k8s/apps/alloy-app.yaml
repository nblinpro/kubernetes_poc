apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.11.0
    helm:
      valuesObject:
        # Deployment à 1 replica plutôt que le DaemonSet par défaut : la découverte
        # loki.source.kubernetes se fait via l'API Kubernetes (tous les pods du
        # cluster, pas seulement ceux du nœud local) — un DaemonSet dupliquerait les
        # logs sur chaque nœud.
        controller:
          type: deployment
          replicas: 1
        alloy:
          configMap:
            content: |-
              discovery.kubernetes "pods" {
                role = "pod"
              }

              // Promeut les métadonnées Kubernetes en vrais labels Loki : sans ça,
              // seuls "pod"/"service_name"/"stream" existent, on ne peut pas filtrer
              // par namespace/container dans Grafana.
              discovery.relabel "pods" {
                targets = discovery.kubernetes.pods.targets

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
              }

              loki.source.kubernetes "pods" {
                targets    = discovery.relabel.pods.output
                forward_to = [loki.write.local.receiver]
              }

              loki.write "local" {
                endpoint {
                  url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
                }
              }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
