apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-todo-api
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  todo-api.json: |
    {
      "title": "To-Do API (namespace todo)",
      "uid": "todo-api-overview",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Pods Running",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"todo\", phase=\"Running\"})",
              "legendFormat": "running"
            }
          ]
        },
        {
          "id": 2,
          "title": "Redémarrages de conteneurs (5m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"todo\"}[5m]))",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
