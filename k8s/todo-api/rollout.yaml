apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: todo-api
  namespace: todo
spec:
  # 4 replicas : avec 1 seule replica, une pondération canary (25%/50%) n'a pas de sens
  # (systématiquement arrondie à 0 ou 1 pod) — 4 permet des paliers réels 1/4, 2/4, 4/4.
  replicas: 4
  selector:
    matchLabels:
      app: todo-api
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: {} # indéfinie : promotion manuelle via `kubectl argo rollouts promote todo-api`
        - setWeight: 50
        - pause:
            duration: 30s
        - setWeight: 100
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
        - name: todo-api
          image: ghcr.io/nblinpro/kubernetes_poc/todo-api:b66e67d2ca9df64de6b1bf22e1699068ae9507d1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: todo-db-app
                  key: uri
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
